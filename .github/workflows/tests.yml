name: Testes FastAPI CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9' # Ou a versão do Python que você usa

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pytest python-multipart httpx
        # Adicione aqui quaisquer outras dependências do seu projeto FastAPI
        # Por exemplo: pip install "SQLAlchemy[asyncio]" "asyncpg" alembic

    - name: Configurar PYTHONPATH
      run: echo "PYTHONPATH=$PYTHONPATH:$(pwd )" >> $GITHUB_ENV

    - name: Rodar testes
      run: |
        # Assumindo que seus arquivos de teste estão na raiz ou em uma pasta 'tests/'
        # E que o app.main é acessível para o TestClient
        pytest
