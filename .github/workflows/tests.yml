name: Testes FastAPI CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9' # Ajuste para a versão que você utiliza (ex: '3.10', '3.11')

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        # Garante que todas as dependências necessárias, incluindo sqlalchemy, redis e psycopg2-binary, sejam instaladas
        pip install fastapi uvicorn pytest python-multipart httpx sqlalchemy redis psycopg2-binary
        
        # IMPORTANTE: Se você tiver um arquivo requirements.txt, use o comando abaixo:
        # pip install -r requirements.txt
        
        # Adicione aqui outras dependências manuais se necessário:
        # pip install passlib python-jose[cryptography]

    - name: Rodar testes
      run: |
        # Define o PYTHONPATH para incluir:
        # 1. A raiz do projeto (para imports como 'backend.users.app.main' )
        # 2. As pastas 'backend/users' e 'backend/orders' (para que 'app' dentro delas seja um pacote de nível superior)
        # Isso deve resolver os imports internos como 'from app import models'
        export PYTHONPATH=$(pwd):$(pwd)/backend/users:$(pwd)/backend/orders:$PYTHONPATH
        pytest
